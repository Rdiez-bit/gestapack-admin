<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestapack · Dashboard Comercial</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');
:root{
  --bg:#0f1117;--surface:#181c27;--surface2:#1e2333;--border:#2a2f42;
  --accent:#e8c547;--accent2:#4fc3f7;--red:#ef5350;--orange:#ff9800;
  --green:#66bb6a;--text:#e8eaf0;--muted:#7b82a0;
  --fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--fb);font-size:14px;min-height:100vh;}
header{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100;}
.logo{font-family:var(--fh);font-size:21px;font-weight:800;letter-spacing:-.5px;}.logo span{color:var(--accent);}
.hm{display:flex;align-items:center;gap:16px;}
.hdate{font-size:12px;color:var(--muted);}
#ubtn{background:var(--accent);color:#0f1117;border:none;padding:8px 16px;border-radius:6px;font-family:var(--fh);font-weight:700;font-size:12px;cursor:pointer;transition:opacity .2s;}
#ubtn:hover{opacity:.85;}
#fi{display:none;}
.data-tag{font-size:11px;color:var(--green);background:rgba(102,187,106,.1);border:1px solid rgba(102,187,106,.3);padding:3px 10px;border-radius:12px;}
.tabs{display:flex;gap:2px;padding:14px 28px 0;border-bottom:1px solid var(--border);background:var(--surface);overflow-x:auto;}
.tab{padding:9px 18px;font-family:var(--fh);font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.3px;white-space:nowrap;}
.tab:hover{color:var(--text);}.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
main{padding:24px 28px;max-width:1800px;}
.panel{display:none;}.panel.active{display:block;}
#dz{border:2px dashed var(--border);border-radius:12px;padding:44px;text-align:center;color:var(--muted);margin-bottom:24px;transition:all .2s;cursor:pointer;}
#dz.over{border-color:var(--accent);color:var(--accent);}
#dz h3{font-family:var(--fh);font-size:17px;margin-bottom:6px;}
#dz p{font-size:12px;}
#dz.loaded{border-style:solid;border-color:var(--green);color:var(--green);padding:14px 24px;display:flex;align-items:center;gap:12px;justify-content:center;}
.kg{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px;}
.kc{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;position:relative;overflow:hidden;}
.kc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);}
.kc.g::before{background:var(--green);}.kc.b::before{background:var(--accent2);}.kc.o::before{background:var(--orange);}.kc.r::before{background:var(--red);}
.kl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px;}
.kv{font-family:var(--fh);font-size:23px;font-weight:700;line-height:1;}
.ks{font-size:11px;color:var(--muted);margin-top:5px;}
.st{font-family:var(--fh);font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.st::after{content:'';flex:1;height:1px;background:var(--border);}
.tw{overflow-x:auto;border-radius:10px;border:1px solid var(--border);margin-bottom:24px;}
table{width:100%;border-collapse:collapse;}
thead tr{background:var(--surface2);}
th{padding:10px 13px;text-align:left;font-family:var(--fh);font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);white-space:nowrap;}
th.r,td.r{text-align:right;}
td{padding:9px 13px;border-top:1px solid var(--border);font-size:13px;white-space:nowrap;}
tr:hover td{background:var(--surface2);}
.nc{font-weight:500;}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:600;}
.be{background:rgba(102,187,106,.15);color:var(--green);}
.bb{background:rgba(79,195,247,.15);color:var(--accent2);}
.bj{background:rgba(255,152,0,.15);color:var(--orange);}
.bc{background:rgba(239,83,80,.15);color:var(--red);}
.pbw{width:100%;background:var(--border);border-radius:4px;height:5px;margin-bottom:3px;}
.pbf{height:5px;border-radius:4px;}
.vg{display:grid;grid-template-columns:repeat(auto-fit,minmax(330px,1fr));gap:18px;margin-bottom:24px;}
.vc{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;}
.vch{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.vcn{font-family:var(--fh);font-size:15px;font-weight:700;}
.vcz{font-size:11px;color:var(--muted);margin-top:2px;}
.vcp{font-family:var(--fh);font-size:26px;font-weight:800;line-height:1;}
.vck{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;}
.vcki{background:var(--surface2);border-radius:8px;padding:9px 11px;}
.vckl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;}
.vckv{font-family:var(--fh);font-size:14px;font-weight:700;margin-top:2px;}
.dw{margin-top:14px;}
.dt{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;}
.di{max-height:170px;overflow-y:auto;border-radius:8px;border:1px solid var(--border);}
.dta{width:100%;font-size:11px;}
.dta th{padding:5px 9px;font-size:9px;}
.dta td{padding:5px 9px;}
.mi{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 9px;color:var(--text);font-family:var(--fb);font-size:13px;width:150px;}
.mi:focus{outline:none;border-color:var(--accent);}
.smb{background:var(--accent);color:#0f1117;border:none;padding:5px 13px;border-radius:6px;font-family:var(--fh);font-weight:700;font-size:11px;cursor:pointer;}
.smb:hover{opacity:.85;}
.ptag{display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 12px;font-size:11px;color:var(--muted);margin-bottom:18px;}
.ptag strong{color:var(--accent);}
.empty{text-align:center;padding:50px 20px;color:var(--muted);}
.empty h3{font-family:var(--fh);font-size:17px;margin-bottom:6px;color:var(--text);}
/* top20 rank */
.rank-num{font-family:var(--fh);font-weight:700;color:var(--muted);font-size:12px;width:28px;display:inline-block;}
.rank-num.gold{color:#f59e0b;}
.rank-num.silver{color:#9ca3af;}
.rank-num.bronze{color:#b45309;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>

function setupDrop() {

  dz.addEventListener('dragleave', ()=>dz.classList.remove('over'));

function loadFile(file) {
  const r = new FileReader();
  r.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, {type:'binary', cellDates:false});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(ws, {raw:true, defval:''});
      DATA = parseRows(json);
      if (!DATA.length) { alert('No se encontraron filas válidas (FA o NC) en el archivo.'); return; }
      const dz = document.getElementById('dz');
      dz.classList.add('loaded');
      dz.innerHTML = '<span>✓</span><span><strong>'+file.name+'</strong> · '+DATA.length.toLocaleString('es-CL')+' registros · Clic para reemplazar</span>';
      document.getElementById('dtag').style.display='inline';
      document.getElementById('dtag').textContent=DATA.length.toLocaleString('es-CL')+' filas';
      renderAll();
    } catch(err) { alert('Error: '+err.message); }
  };
  r.readAsBinaryString(file);
}

// ═══════════════════════════════════════════════════
// PARSER
// ═══════════════════════════════════════════════════
function parseRows(json) {
  if (!json.length) return [];
  const hh = Object.keys(json[0]);

  // Búsqueda exacta (evita ambigüedades como "Cantidad" vs "Cantidad Equivalente")
  function colExact(...pp) {
    for (const p of pp) {
      const h = hh.find(h => norm(h) === norm(p));
      if (h) return h;
    }
    return null;
  }
  // Búsqueda por substring (para columnas sin ambigüedad)
  function col(...pp) {
    for (const p of pp) {
      const h = hh.find(h => norm(h).includes(norm(p)));
      if (h) return h;
    }
    return null;
  }

  const C = {
    doc: colExact('Documento'),
    f:   colExact('Fecha'),
    vd:  colExact('Vendedor'),
    ru:  colExact('Rut'),
    rs:  col('Razón Social','razon social','cliente'),
    pr:  colExact('Producto') || col('descripcion'),
    sk:  colExact('SKU')      || col('codigo'),
    um:  colExact('Unidad Medida') || col('unidad medida'),
    qt:  colExact('Cantidad'),   // EXACTO — evita "Cantidad Equivalente"
    tl:  col('Total Línea','total linea','totallinea'),
    mc:  col('Margen Contrib $','margen contrib $'),
    cv:  col('Costo Venta Total','costo venta'),
  };

  return json
    .filter(row => DOCS_VALIDOS.includes(String(row[C.doc]||'').trim()))
    .map(row => {
      const fecha = parseDate(C.f ? row[C.f] : '');
      if (!fecha) return null;
      const tl  = pn(C.tl ? row[C.tl] : 0);
      const mc  = pn(C.mc ? row[C.mc] : 0);
      const qt  = pn(C.qt ? row[C.qt] : 0);
      const um  = String(C.um ? row[C.um] : '').trim().toUpperCase().replace(/\s+/g,'');
      const sk  = String(C.sk ? row[C.sk] : '').trim();
      const ru  = String(C.ru ? row[C.ru] : '').trim();
      const rs  = String(C.rs ? row[C.rs] : '').trim();
      const pr  = String(C.pr ? row[C.pr] : '').trim();
      const vd  = String(C.vd ? row[C.vd] : '').trim();
      // KG: cualquier variante que empiece con KG (KG, KG , KGJ)
      const kg  = um.startsWith('KG') ? qt : 0;
      const vdKey = normVd(vd);
      return { fecha, tl, mc, qt, kg, sk, ru, rs, pr, vd, vdKey };
    })
    .filter(r => r !== null);
}

function parseDate(val) {
  if (!val) return null;
  if (typeof val === 'number' && val > 1000) {
    const d = new Date(Math.round((val-25569)*86400000));
    if (!isNaN(d)) return d;
  }
  const s = String(val).trim();
  const m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if (m) { const y=m[3].length===2?'20'+m[3]:m[3]; return new Date(parseInt(y),parseInt(m[2])-1,parseInt(m[1])); }
  const d = new Date(s);
  return isNaN(d) ? null : d;
}

function pn(v) {
  if (v===''||v===null||v===undefined) return 0;
  if (typeof v==='number') return v;
  const s = String(v).trim().replace(/^\((.+)\)$/,'-$1').replace(/\./g,'').replace(',','.').replace(/[^0-9.\-]/g,'');
  return parseFloat(s)||0;
}

function norm(s)    { return String(s).trim().toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[\s_\-\.]/g,''); }
function normVd(s)  { return String(s).trim().toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }

// ═══════════════════════════════════════════════════
// PERÍODOS
// ═══════════════════════════════════════════════════
function getMC() {
  const n=new Date(), y=n.getFullYear(), m=n.getMonth();
  return { i:new Date(y,m,1), f:new Date(y,m+1,0,23,59,59),
    label:MESES_ES[m]+' '+y, mesKey:y+'-'+String(m+1).padStart(2,'0') };
}

function getMM() {
  const n=new Date(); let i,f;
  if (n.getDate()>=26) { i=new Date(n.getFullYear(),n.getMonth(),26); f=new Date(n.getFullYear(),n.getMonth()+1,25,23,59,59); }
  else                 { i=new Date(n.getFullYear(),n.getMonth()-1,26); f=new Date(n.getFullYear(),n.getMonth(),25,23,59,59); }
  const mesKey = i.getFullYear()+'-'+String(i.getMonth()+1).padStart(2,'0');
  const opts = {day:'numeric',month:'long'};
  return { i, f, label:i.toLocaleDateString('es-CL',opts)+' → '+f.toLocaleDateString('es-CL',opts), mesKey };
}

function fp(data,i,f) { return data.filter(r=>r.fecha>=i&&r.fecha<=f); }

// ═══════════════════════════════════════════════════
// AGREGACIONES
// ═══════════════════════════════════════════════════
function ag(rows) {
  if (!rows.length) return {tl:0,mc:0,pct:0,kg:0,cl:0,sk:0,tk:0,cpk:0};
  const tl  = rows.reduce((s,r)=>s+r.tl,0);
  const mc  = rows.reduce((s,r)=>s+r.mc,0);
  const kg  = rows.reduce((s,r)=>s+r.kg,0);
  const pct = tl!==0?(mc/tl)*100:0;
  const cl  = new Set(rows.map(r=>r.ru).filter(Boolean)).size;
  const sk  = new Set(rows.map(r=>r.sk).filter(s=>s&&s!=='undefined'&&s!=='')).size;
  const tk  = cl>0?tl/cl:0;
  const cpk = kg>0?mc/kg:0;
  return {tl,mc,pct,kg,cl,sk,tk,cpk};
}

function agByVd(rows) {
  const m={};
  rows.forEach(r=>{ if(!r.vdKey)return; if(!m[r.vdKey])m[r.vdKey]=[]; m[r.vdKey].push(r); });
  return Object.entries(m)
    .map(([k,rs])=>({k, name:displayName(k), ...ag(rs), rows:rs}))
    .sort((a,b)=>a.name.localeCompare(b.name,'es'));
}

function agByDay(rows, vdKey) {
  const vr=rows.filter(r=>r.vdKey===vdKey);
  const m={};
  vr.forEach(r=>{ const k=r.fecha.toISOString().split('T')[0]; if(!m[k])m[k]=[]; m[k].push(r); });
  return Object.entries(m).sort((a,b)=>b[0].localeCompare(a[0])).map(([d,rs])=>({d,...ag(rs)}));
}

function agByMonth(rows) {
  const m={};
  rows.forEach(r=>{ const k=r.fecha.getFullYear()+'-'+String(r.fecha.getMonth()+1).padStart(2,'0'); if(!m[k])m[k]=[]; m[k].push(r); });
  return Object.entries(m).sort((a,b)=>a[0].localeCompare(b[0])).map(([k,rs])=>({k,...ag(rs)}));
}

// Top N por campo
function topN(rows, field, n, labelField) {
  const m={};
  rows.forEach(r=>{ const k=r[labelField]; if(!k)return; if(!m[k])m[k]={label:k,tl:0,mc:0,kg:0}; m[k].tl+=r.tl; m[k].mc+=r.mc; m[k].kg+=r.kg; });
  return Object.values(m).sort((a,b)=>b[field]-a[field]).slice(0,n);
}

// ═══════════════════════════════════════════════════
// FORMATO
// ═══════════════════════════════════════════════════
function fCLP(v) { return '$'+Math.round(v).toLocaleString('es-CL'); }
function fPct(v) { return v.toFixed(1)+'%'; }
function fInt(v) { return Math.round(v).toLocaleString('es-CL'); }

function mb(pct) { const r=MR.find(r=>pct>=r.m)||MR[3]; return '<span class="badge '+r.c+'">'+fPct(pct)+'</span>'; }

function pb(val,meta) {
  const p=meta>0?Math.min((val/meta)*100,100):0;
  const c=p>=100?'var(--green)':p>=70?'var(--accent)':p>=40?'var(--orange)':'var(--red)';
  return '<div class="pbw"><div class="pbf" style="width:'+p+'%;background:'+c+'"></div></div>';
}
function pc(p)  { return p>=100?'var(--green)':p>=70?'var(--accent)':p>=40?'var(--orange)':'var(--red)'; }
function mc2(p) { return p>=20?'var(--green)':p>=16?'var(--accent2)':p>=13?'var(--orange)':'var(--red)'; }

function displayName(k) { return VC[k]?.s || k.split(' ').map(w=>w.length?w[0]+w.slice(1).toLowerCase():'').join(' '); }
function mesLabel(k)    { const [y,m]=k.split('-'); return MESES_ES[parseInt(m)-1]+' '+y; }

function kpi(label,val,sub,cls='') {
  return '<div class="kc'+(cls?' '+cls:'')+'"><div class="kl">'+label+'</div><div class="kv">'+val+'</div>'+(sub?'<div class="ks">'+sub+'</div>':'')+'</div>';
}

function rankNum(i) {
  const cls = i===0?'gold':i===1?'silver':i===2?'bronze':'';
  return '<span class="rank-num'+( cls?' '+cls:'')+'">'+( i+1)+'</span>';
}

function saveMetas()  { localStorage.setItem('gp_metas3',JSON.stringify(METAS)); }

function saveMeta(vdKey) {

}

// MES MÓVIL
// ═══════════════════════════════════════════════════
function renderMM() {
  const {i,f,label,mesKey}=getMM();
  const rows=fp(DATA,i,f);

  const byV=agByVd(rows);

  let h='<div class="ptag">Período de comisiones (26→25): <strong>'+label+'</strong></div>';
  // Calcular meta total de la compañía
  const metaTotal = Object.keys(VC).reduce((s,vk) => s + getMeta(vk, mesKey), 0);
  const pctTotal  = metaTotal>0 ? (tot.mc/metaTotal*100) : null;
  const pctTotStr = pctTotal!==null ? pctTotal.toFixed(1)+'%' : '—';
  const pctTotCol = pctTotal!==null ? pc(pctTotal) : 'var(--muted)';

  h+='<div class="kg">';
  h+=kpi('Venta Neta',     fCLP(tot.tl),'');
  h+=kpi('Contribución $', fCLP(tot.mc),'','g');
  h+=kpi('Margen %',       fPct(tot.pct),'','b');
  h+=kpi('Contrib / KG',   fCLP(tot.cpk),'','o');
  h+=kpi('Clientes',       fInt(tot.cl),'');
  h+=kpi('SKUs Vendidos',  fInt(tot.sk),'');
  // Días hábiles del período móvil y proyección
  // Feriados Chile 2026
  const FERIADOS_CL = ['2026-01-01','2026-04-03','2026-04-04','2026-05-01','2026-05-21',
    '2026-06-29','2026-07-16','2026-08-15','2026-09-18','2026-09-19','2026-10-12',
    '2026-10-31','2026-11-01','2026-12-08','2026-12-25'];
  function esHabil(d) {
    const dow = d.getDay();
    if (dow===0||dow===6) return false;
    const key = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    return !FERIADOS_CL.includes(key);
  }
  function diasHabiles(desde, hasta) {
    let n=0, d=new Date(desde);
    while(d<=hasta){ if(esHabil(d))n++; d=new Date(d.getTime()+86400000); }
    return n;
  }
  const hoy = new Date(); hoy.setHours(23,59,59,999);
  const diasTot  = diasHabiles(i, f);
  const diasTrans= diasHabiles(i, hoy<f?hoy:f);
  const diasRest = diasTot - diasTrans;
  const ritmo    = diasTrans>0 ? tot.mc/diasTrans : 0;
  const proyecc  = ritmo * diasTot;
  const pctProy  = metaTotal>0 ? (proyecc/metaTotal*100) : null;
  const pctProyStr = pctProy!==null ? pctProy.toFixed(1)+'%' : '—';

  h+='<div style="flex:1">';
  h+='<div style="font-size:11px;color:var(--muted);margin-bottom:4px">'+fCLP(tot.mc)+' / '+fCLP(metaTotal)+'</div>';

  h+='</div></div></div>';

  // KPI proyección
  h+='<div class="kc" style="grid-column:span 1">';
  h+='<div class="kl">Proyección al Cierre del Período</div>';
  h+='<div style="display:flex;align-items:center;gap:12px;margin-top:4px">';
  h+='<div class="kv" style="color:'+pctProyCol+'">'+pctProyStr+'</div>';
  h+='<div style="flex:1">';
  h+='<div style="font-size:11px;color:var(--muted);margin-bottom:4px">'+fCLP(proyecc)+' proyectado</div>';
  h+='<div style="font-size:10px;color:var(--muted)">'+diasTrans+' días háb. transcurridos · '+diasRest+' restantes</div>';
  h+=(metaTotal>0?'<div class="pbw" style="height:8px;margin-top:4px"><div class="pbf" style="width:'+Math.min(pctProy,100).toFixed(1)+'%;background:'+pctProyCol+';height:8px"></div></div>':'');
  h+='</div></div></div>';
  h+='</div>';

  h+='<div class="st">Avance de Contribución vs Meta</div>';
  h+='<div class="tw"><table><thead><tr>';
  h+='<th>Vendedor</th><th>Zona</th><th class="r">Venta Neta</th><th class="r">Contrib $</th>';
  h+='<th class="r">Margen %</th><th class="r">Cumplimiento %</th><th style="min-width:130px">Progreso</th>';
  h+='<th class="r">Contrib/KG</th><th class="r">Clientes</th>';
  h+='</tr></thead><tbody>';

  byV.forEach(v=>{
    const meta=getMeta(v.k,mesKey);
    const pn2=meta>0?(v.mc/meta*100):null;
    const ps=pn2!==null?pn2.toFixed(1)+'%':'—';
    const zona=VC[v.k]?.z||'';
    h+='<tr>';
    h+='<td class="nc">'+v.name+'</td>';
    h+='<td style="color:var(--muted);font-size:12px">'+zona+'</td>';
    h+='<td class="r">'+fCLP(v.tl)+'</td>';
    h+='<td class="r" style="font-family:var(--fh);font-weight:700">'+fCLP(v.mc)+'</td>';
    h+='<td class="r">'+mb(v.pct)+'</td>';
    h+='<td class="r" style="font-family:var(--fh);font-weight:700;color:'+(pn2!==null?pc(pn2):'var(--muted)')+'">'+ps+'</td>';
    h+='<td>'+(meta>0?pb(v.mc,meta):'')+'</td>';
    h+='<td class="r">'+fCLP(v.cpk)+'</td>';
    h+='<td class="r">'+v.cl+'</td>';
    h+='</tr>';
  });
  h+='</tbody></table></div>';
  document.getElementById('mm-c').innerHTML=h;
}

// ═══════════════════════════════════════════════════
// VENDEDORES
// ═══════════════════════════════════════════════════
function renderVV() {
  const {i,f,label,mesKey}=getMM();
  const rows=fp(DATA,i,f);
  const byV=agByVd(rows);

  let h='<div class="ptag">Mes móvil: <strong>'+label+'</strong></div>';
  h+='<div class="st">Seguimiento Diario por Vendedor</div>';
  h+='<div class="vg">';

  byV.forEach(v=>{
    const meta=getMeta(v.k,mesKey);
    const pn2=meta>0?(v.mc/meta*100):null;
    const ps=pn2!==null?pn2.toFixed(0)+'%':'—';
    const pc2=pn2!==null?pc(pn2):'var(--muted)';
    const cfg=VC[v.k]||{s:v.name,z:''};
    const dias=agByDay(rows,v.k);

    h+='<div class="vc">';
    h+='<div class="vch"><div><div class="vcn">'+cfg.s+'</div><div class="vcz">'+cfg.z+'</div></div>';
    h+='<div><div class="vcp" style="color:'+pc2+'">'+ps+'</div><div style="font-size:9px;color:var(--muted);text-align:right;margin-top:2px">contrib.</div></div></div>';
    if(meta>0)h+=pb(v.mc,meta);
    h+='<div style="font-size:11px;color:var(--muted);margin-top:3px;margin-bottom:2px">'+fCLP(v.mc)+(meta>0?' / '+fCLP(meta):'')+'</div>';
    h+='<div class="vck">';
    h+='<div class="vcki"><div class="vckl">Venta Neta</div><div class="vckv">'+fCLP(v.tl)+'</div></div>';
    h+='<div class="vcki"><div class="vckl">Margen %</div><div class="vckv" style="color:'+mc2(v.pct)+'">'+fPct(v.pct)+'</div></div>';
    h+='<div class="vcki"><div class="vckl">Clientes</div><div class="vckv">'+v.cl+'</div></div>';
    h+='<div class="vcki"><div class="vckl">Contrib/KG</div><div class="vckv">'+fCLP(v.cpk)+'</div></div>';
    h+='</div>';
    if(dias.length){
      h+='<div class="dw"><div class="dt">Detalle por día ('+dias.length+')</div>';
      h+='<div class="di"><table class="dta"><thead><tr>';
      h+='<th>Día</th><th class="r">Venta</th><th class="r">Contrib $</th><th class="r">Margen</th><th class="r">Clientes</th>';
      h+='</tr></thead><tbody>';
      dias.forEach(d=>{
        const ds=new Date(d.d+'T12:00:00').toLocaleDateString('es-CL',{weekday:'short',day:'numeric',month:'short'});
        h+='<tr><td>'+ds+'</td><td class="r">'+fCLP(d.tl)+'</td><td class="r">'+fCLP(d.mc)+'</td><td class="r">'+mb(d.pct)+'</td><td class="r">'+d.cl+'</td></tr>';
      });
      h+='</tbody></table></div></div>';
    }
    h+='</div>';
  });
  h+='</div>';
  document.getElementById('vv-c').innerHTML=h;
}

// ═══════════════════════════════════════════════════
// ANUAL
// ═══════════════════════════════════════════════════
function renderAN() {
  if(!DATA.length){document.getElementById('an-c').innerHTML='<div class="empty"><h3>Sin datos</h3></div>';return;}
  const meses=agByMonth(DATA);
  const year=DATA[0].fecha.getFullYear();
  const mesKeys=meses.map(m=>m.k);
  const byVAll=agByVd(DATA);

  let h='<div class="ptag">Consolidado <strong>'+year+'</strong> — mes a mes</div>';

  // ── Tabla resumen mensual global ──
  h+='<div class="st">Resumen Mensual Global</div>';
  h+='<div class="tw"><table><thead><tr>';
  h+='<th>Mes</th><th class="r">Venta Neta</th><th class="r">Contribución $</th>';
  h+='<th class="r">Margen %</th><th class="r">Contrib/KG</th><th class="r">Clientes</th><th class="r">SKUs</th>';
  h+='</tr></thead><tbody>';
  meses.forEach(m=>{
    const [y,mo]=m.k.split('-');
    h+='<tr><td class="nc">'+MESES_ES[parseInt(mo)-1]+' '+y+'</td>';
    h+='<td class="r">'+fCLP(m.tl)+'</td>';
    h+='<td class="r">'+fCLP(m.mc)+'</td>';
    h+='<td class="r">'+mb(m.pct)+'</td>';
    h+='<td class="r">'+fCLP(m.cpk)+'</td>';
    h+='<td class="r">'+m.cl+'</td>';
    h+='<td class="r">'+m.sk+'</td></tr>';
  });
  const tot=ag(DATA);
  h+='<tr style="background:var(--surface2)">';
  h+='<td style="font-weight:700;font-family:var(--fh)">TOTAL AÑO</td>';
  h+='<td class="r" style="font-weight:700;font-family:var(--fh)">'+fCLP(tot.tl)+'</td>';
  h+='<td class="r" style="font-weight:700;font-family:var(--fh)">'+fCLP(tot.mc)+'</td>';
  h+='<td class="r">'+mb(tot.pct)+'</td>';
  h+='<td class="r" style="font-weight:700">'+fCLP(tot.cpk)+'</td>';
  h+='<td class="r" style="font-weight:700">'+fInt(tot.cl)+'</td>';
  h+='<td class="r" style="font-weight:700">'+fInt(tot.sk)+'</td></tr>';
  h+='</tbody></table></div>';

  // ── Venta Neta por vendedor × mes ──
  h+='<div class="st">Venta Neta por Vendedor — Mes a Mes</div>';
  h+='<div class="tw"><table><thead><tr><th>Vendedor</th>';
  mesKeys.forEach(k=>{ const [y,mo]=k.split('-'); h+='<th class="r">'+MESES_ES[parseInt(mo)-1].substring(0,3)+'</th>'; });
  h+='<th class="r">Total</th></tr></thead><tbody>';
  byVAll.forEach(v=>{
    h+='<tr><td class="nc">'+v.name+'</td>';
    let vTot=0;
    mesKeys.forEach(mk=>{
      const [y,mo]=mk.split('-');
      const rr=fp(DATA,new Date(+y,+mo-1,1),new Date(+y,+mo,0,23,59,59)).filter(r=>r.vdKey===v.k);
      const venta=rr.reduce((s,r)=>s+r.tl,0); vTot+=venta;
      h+='<td class="r" style="color:'+(venta!==0?'var(--text)':'var(--muted)')+'">'+( venta!==0?fCLP(venta):'—')+'</td>';
    });
    h+='<td class="r" style="font-weight:700;font-family:var(--fh)">'+fCLP(vTot)+'</td></tr>';
  });
  h+='</tbody></table></div>';

  // ── Contribución $ por vendedor × mes ──
  h+='<div class="st">Contribución $ por Vendedor — Mes a Mes</div>';
  h+='<div class="tw"><table><thead><tr><th>Vendedor</th>';
  mesKeys.forEach(k=>{ const [y,mo]=k.split('-'); h+='<th class="r">'+MESES_ES[parseInt(mo)-1].substring(0,3)+'</th>'; });
  h+='<th class="r">Total</th></tr></thead><tbody>';
  byVAll.forEach(v=>{
    h+='<tr><td class="nc">'+v.name+'</td>';
    let mcTot=0;
    mesKeys.forEach(mk=>{
      const [y,mo]=mk.split('-');
      const rr=fp(DATA,new Date(+y,+mo-1,1),new Date(+y,+mo,0,23,59,59)).filter(r=>r.vdKey===v.k);
      const contrib=rr.reduce((s,r)=>s+r.mc,0); mcTot+=contrib;
      h+='<td class="r" style="color:'+(contrib!==0?'var(--green)':'var(--muted)')+'">'+( contrib!==0?fCLP(contrib):'—')+'</td>';
    });
    h+='<td class="r" style="font-weight:700;font-family:var(--fh);color:var(--green)">'+fCLP(mcTot)+'</td></tr>';
  });
  h+='</tbody></table></div>';

  // ── Margen % por vendedor × mes ──
  h+='<div class="st">Margen % por Vendedor — Mes a Mes</div>';
  h+='<div class="tw"><table><thead><tr><th>Vendedor</th>';
  mesKeys.forEach(k=>{ const [y,mo]=k.split('-'); h+='<th class="r">'+MESES_ES[parseInt(mo)-1].substring(0,3)+'</th>'; });
  h+='<th class="r">Prom.</th></tr></thead><tbody>';
  byVAll.forEach(v=>{
    h+='<tr><td class="nc">'+v.name+'</td>';
    let tTL=0,tMC=0;
    mesKeys.forEach(mk=>{
      const [y,mo]=mk.split('-');
      const rr=fp(DATA,new Date(+y,+mo-1,1),new Date(+y,+mo,0,23,59,59)).filter(r=>r.vdKey===v.k);
      const vtl=rr.reduce((s,r)=>s+r.tl,0), vmc=rr.reduce((s,r)=>s+r.mc,0);
      tTL+=vtl; tMC+=vmc;
      h+='<td class="r">'+(vtl!==0?mb((vmc/vtl)*100):'<span style="color:var(--muted)">—</span>')+'</td>';
    });
    h+='<td class="r">'+(tTL!==0?mb((tMC/tTL)*100):'—')+'</td></tr>';
  });
  h+='</tbody></table></div>';

  document.getElementById('an-c').innerHTML=h;
}

// ═══════════════════════════════════════════════════
// TOP 20
// ═══════════════════════════════════════════════════
function renderT20() {
  const {i,f,label}=getMC();
  const rows=fp(DATA,i,f);
  if(!rows.length){document.getElementById('t20-c').innerHTML='<div class="empty"><h3>Sin datos para el mes actual</h3></div>';return;}

  const topProd    = topN(rows,'mc',20,'pr');
  const topClients = topN(rows,'mc',20,'rs');

  let h='<div class="ptag">Mes calendario: <strong>'+label+'</strong></div>';

  // Dos columnas side by side
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">';

  // Calcular totales para % representación
  const totMC = ag(rows).mc;
  const top20ProdMC = topProd.reduce((s,p)=>s+p.mc,0);
  const top20CliMC  = topClients.reduce((s,p)=>s+p.mc,0);
  const pctProd = totMC>0?(top20ProdMC/totMC*100):0;
  const pctCli  = totMC>0?(top20CliMC/totMC*100):0;

  // Top 20 Productos
  h+='<div>';
  h+='<div class="st">Top 20 Productos por Contribución</div>';
  h+='<div style="display:flex;align-items:center;gap:16px;margin-bottom:12px;">';
  h+='<div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 18px;">';
  h+='<span style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;">Contrib. top 20 productos</span>';
  h+='<div style="font-family:var(--fh);font-size:20px;font-weight:700;margin-top:3px;">'+fCLP(top20ProdMC)+'<span style="font-size:13px;color:var(--accent);margin-left:8px;">'+pctProd.toFixed(1)+'% del total</span></div>';
  h+='</div></div>';
  h+='<div class="tw"><table><thead><tr>';
  h+='<th>#</th><th>Producto</th><th class="r">Contrib $</th><th class="r">Venta Neta</th><th class="r">Margen %</th>';
  h+='</tr></thead><tbody>';
  topProd.forEach((p,i)=>{
    const pct=p.tl!==0?(p.mc/p.tl)*100:0;
    h+='<tr><td>'+rankNum(i)+'</td>';
    h+='<td class="nc" style="max-width:220px;overflow:hidden;text-overflow:ellipsis" title="'+p.label+'">'+p.label+'</td>';
    h+='<td class="r" style="color:var(--green);font-weight:600">'+fCLP(p.mc)+'</td>';
    h+='<td class="r">'+fCLP(p.tl)+'</td>';
    h+='<td class="r">'+mb(pct)+'</td></tr>';
  });
  h+='</tbody></table></div></div>';

  // Top 20 Clientes
  h+='<div>';
  h+='<div class="st">Top 20 Clientes por Contribución</div>';
  h+='<div style="display:flex;align-items:center;gap:16px;margin-bottom:12px;">';
  h+='<div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 18px;">';
  h+='<span style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;">Contrib. top 20 clientes</span>';
  h+='<div style="font-family:var(--fh);font-size:20px;font-weight:700;margin-top:3px;">'+fCLP(top20CliMC)+'<span style="font-size:13px;color:var(--accent);margin-left:8px;">'+pctCli.toFixed(1)+'% del total</span></div>';
  h+='</div></div>';
  h+='<div class="tw"><table><thead><tr>';
  h+='<th>#</th><th>Cliente</th><th class="r">Contrib $</th><th class="r">Venta Neta</th><th class="r">Margen %</th>';
  h+='</tr></thead><tbody>';
  topClients.forEach((c,i)=>{
    const pct=c.tl!==0?(c.mc/c.tl)*100:0;
    h+='<tr><td>'+rankNum(i)+'</td>';
    h+='<td class="nc" style="max-width:220px;overflow:hidden;text-overflow:ellipsis" title="'+c.label+'">'+c.label+'</td>';
    h+='<td class="r" style="color:var(--green);font-weight:600">'+fCLP(c.mc)+'</td>';
    h+='<td class="r">'+fCLP(c.tl)+'</td>';
    h+='<td class="r">'+mb(pct)+'</td></tr>';
  });
  h+='</tbody></table></div></div>';

  h+='</div>';
  document.getElementById('t20-c').innerHTML=h;
}

// ═══════════════════════════════════════════════════
// METAS
// ═══════════════════════════════════════════════════
function renderMT() {
  const {mesKey,label}=getMM();
  // Todos los vendedores de VC ordenados alfabéticamente
  const vds=Object.keys(VC).sort((a,b)=>VC[a].s.localeCompare(VC[b].s,'es'));

  let h='<div class="st">Metas de Contribución — Período: '+label+'</div>';
  h+='<p style="color:var(--muted);font-size:12px;margin-bottom:18px">Metas sobre <strong style="color:var(--text)">contribución $</strong>. Se guardan por período, el historial queda registrado automáticamente.</p>';
  h+='<div class="tw"><table><thead><tr>';
  h+='<th>Vendedor</th><th>Zona</th><th>Meta contribución período actual</th><th>Guardar</th><th>Historial</th>';
  h+='</tr></thead><tbody>';

  vds.forEach(vk=>{
    const cfg=VC[vk];
    const meta=getMeta(vk,mesKey);
    const id='mi-'+vk.replace(/\s+/g,'-');
    const hist=METAS[vk]
      ? Object.entries(METAS[vk]).sort((a,b)=>b[0].localeCompare(a[0])).filter(([k])=>k!==mesKey)
          .map(([k,v])=>'<span style="font-size:11px;color:var(--muted)">'+mesLabel(k)+': <strong style="color:var(--text)">'+fCLP(v)+'</strong></span>').join(' · ')
      : '';
    h+='<tr>';
    h+='<td class="nc">'+cfg.s+'</td>';
    h+='<td style="color:var(--muted);font-size:12px">'+cfg.z+'</td>';
    h+='<td><input class="mi" id="'+id+'" type="text" value="'+(meta>0?Math.round(meta).toLocaleString('es-CL'):'')+'" placeholder="ej: 7.000.000"></td>';
    h+='<td><button class="smb" onclick="saveMeta(\''+vk+'\')">Guardar</button></td>';
    h+='<td>'+(hist||'<span style="color:var(--muted);font-size:11px">Sin historial</span>')+'</td>';
    h+='</tr>';
  });
  h+='</tbody></table></div>';
  document.getElementById('mt-c').innerHTML=h;
}
</script>
